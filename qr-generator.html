<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>QR Generator</title>

  <style>
    :root {
      --bg: #f4f4f4;
      --text: #111;
      --card: rgba(255, 255, 255, 0.85);
      --input-bg: #fff;
    }

    body.dark {
      --bg: #111;
      --text: #eee;
      --card: rgba(35, 35, 35, 0.7);
      --input-bg: #1a1a1a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      margin: 0;
      font-family: "Poppins", sans-serif;
      transition: 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      height: fit-content !important;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      padding: 0 20px 20px 20px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      /* backdrop-filter: blur(10px); */
      text-align: center;
      height: fit-content !important;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 12px;
      border: 1px solid #aaa;
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--text);
      margin-bottom: 15px;
      font-size: 16px;
      text-align: center;
    }

    /* Buttons */
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      color: #fff;
      margin: 5px 0;
      width: 100%;
    }

    .download {
      background: #22c55e;
    }

    .toggle {
      background: #a855f7;
    }

    /* For qrcode */
    #qrcode {
      padding: 4%;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>QR Generator</h2>

    <input type="text" id="text" value="(https://github.com/Jay-ARORA-5572)" readonly>

    <div id="qrcode"></div>

    <button class="btn download" onclick="downloadPNG()">Download PNG</button>
    <button class="btn toggle" onclick="toggleTheme()">Dark/Light</button>

  </div>

  <!-- QR Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrious/dist/qrious.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

  <script>
    let lastQRCanvas = null;

    // Generate QR
    function generateQR() {
      const text = document.getElementById("text").value;
      const qr = new QRious({
        value: text,
        size: 248,
      });

      const container = document.getElementById("qrcode");
      container.innerHTML = ""; // clear previous QR
      const canvas = qr.canvas;
      lastQRCanvas = canvas;
      container.appendChild(canvas);
    }

    // Auto-generate QR on page load
    window.onload = generateQR;

    // Download PNG
    function downloadPNG() {
      const link = document.createElement("a");
      link.href = lastQRCanvas.toDataURL("image/png");
      link.download = "qrcode.png";
      link.click();
    }

    // Toggle Dark/Light mode
    function toggleTheme() {
      document.body.classList.toggle("dark");
    }
  </script>

</body>

</html>
